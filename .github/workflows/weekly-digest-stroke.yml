# owner: project-infrastructure
name: Weekly Digest — Stroke

on:
  schedule:
    - cron: '0 16 * * 1'  # Every Monday at 12pm noon EDT (16:00 UTC)
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write  # Needed to push blog pages to gh-pages

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Full history needed for gh-pages push

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git for blog publish
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python3 -m src.pipeline --domain stroke

      - name: Persist seen-pmids
        run: |
          if [[ -f "data/domains/${{ matrix.domain }}/seen-pmids.json" ]]; then
            git add data/domains/${{ matrix.domain }}/seen-pmids.json
            git diff --cached --quiet || git commit -m "Update seen-pmids for ${{ matrix.domain }} domain [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Upload digest artifacts
        uses: actions/upload-artifact@v4
        with:
          name: digest-stroke-${{ github.run_id }}
          path: output/domains/stroke/
