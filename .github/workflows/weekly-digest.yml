# owner: project-infrastructure
name: Weekly Stroke Digest

on:
  # TODO: Enable cron after confirming workflow runs successfully
  # schedule:
  #   - cron: '0 8 * * 1'  # Every Monday at 8am UTC
  workflow_dispatch:  # Manual trigger for testing

permissions:
  contents: write  # Needed to push blog pages to gh-pages

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Full history needed for gh-pages push

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git for blog publish
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python3 -m src.pipeline

      - name: Upload digest artifacts
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ github.run_id }}
          path: output/
