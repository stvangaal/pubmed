# owner: neurology-digest
name: Weekly Member Digest — Neurology

on:
  schedule:
    - cron: '0 19 * * 1'  # Every Monday at 3pm EDT (19:00 UTC), 2h after neurology pipeline
  workflow_dispatch:  # Manual trigger

permissions:
  contents: read

jobs:
  member-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send member digests
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          WP_DIGEST_API_SECRET: ${{ secrets.WP_DIGEST_API_SECRET }}
        run: python3 -m src.distribute.wp_digest --domain neurology
