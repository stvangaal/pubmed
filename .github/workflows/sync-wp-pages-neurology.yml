# owner: wp-pages
name: Sync WordPress Pages — Neurology

on:
  push:
    branches: [main]
    paths: ["content/pages/_defaults/**", "content/pages/neurology/**"]
  workflow_dispatch:  # Manual trigger

permissions:
  contents: read

jobs:
  sync-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync pages to WordPress
        env:
          WP_NEUROLOGY_USERNAME: ${{ secrets.WP_NEUROLOGY_USERNAME }}
          WP_NEUROLOGY_APP_PASSWORD: ${{ secrets.WP_NEUROLOGY_APP_PASSWORD }}
        run: python3 -m src.distribute.wp_pages --domain neurology
