# owner: llm-summarize
# Default configuration for the LLM summarization stage.

prompt_template_file: config/prompts/summary-prompt.md
model: claude-sonnet-4-6
max_tokens: 600

subdomain_options:
  - Acute Treatment
  - Prevention
  - Rehabilitation
  - Hospital Care
  - Imaging
  - Epidemiology

# Google Form (or similar) for per-article clinician feedback.
# The feedback URL is constructed as: {feedback_form_url}?{feedback_pmid_field}={pmid}
feedback_form_url: "https://docs.google.com/forms/d/e/1FAIpQLSdvX69_NZxmeyyGd_EklCPTNRBx35apKakzLeDD_bMrj0NLfA/viewform"
feedback_pmid_field: "entry.834542752"
