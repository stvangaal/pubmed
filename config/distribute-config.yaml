# owner: digest-build
# Distribution configuration for the digest-build stage.

digest_title: "Stroke Literature Weekly"

opening: >-
  Stroke Literature Weekly — {date_range}

  {article_count} articles identified this week.

closing: >-
  This digest was generated by the PubMed Stroke Monitor pipeline.
  Reply with feedback or forward to colleagues who may find it useful.

sort_by: triage_score

output:
  file: output/digest.md
  plain_text: true
  plain_text_file: output/digest.txt
