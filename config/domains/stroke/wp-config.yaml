# owner: wp-publish
# Stroke domain WordPress configuration.
config_version: 1

# Whether to upload articles to WordPress (set false to skip).
enabled: true

# WordPress site URL (no trailing slash).
site_url: "https://strokeconversations.ca"

# Slug of the custom taxonomy registered for clinical topics.
clinical_topics_taxonomy: "clinical_topics"

# Static pages to sync from content/pages/ to WordPress.
# Each slug resolves via: content/pages/stroke/{slug}.md → content/pages/_defaults/{slug}.md
pages:
  - landing
  - about
  - disclaimer
  - privacy-policy
  - terms-of-use
