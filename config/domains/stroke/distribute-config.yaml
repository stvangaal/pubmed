# owner: stroke-migration
# Stroke domain distribution configuration.
config_version: 1

digest_title: "Stroke Literature Weekly"

opening: >-
  Stroke Literature Weekly — {date_range}

  {article_count} articles identified this week.

closing: >-
  This digest was generated by the PubMed Stroke Monitor pipeline.
  Reply with feedback or forward to colleagues who may find it useful.


  Curated by Dr. Stephen van Gaal.


  Article summaries in this digest are generated by AI and may contain errors
  or omissions. This content is intended for licensed healthcare professionals
  and is provided for informational and educational purposes only. It does not
  constitute medical advice, diagnosis, or treatment recommendations. Readers
  should verify important findings against primary sources before applying them
  to patient care.

sort_by: triage_score

# Triage score threshold for full vs short summary in the email digest.
# Articles scoring >= this value get the full summary in the email.
# Articles below this get a 2-sentence teaser with a link to the blog.
# (All articles get the full summary on the blog page regardless.)
full_summary_threshold: 0.80

# Articles scoring >= this threshold appear for ALL subscribers regardless
# of tag preferences. Below this, articles are filtered by subscriber tags.
universal_threshold: 0.80

output:
  file: output/domains/stroke/digest.md
  plain_text: true
  plain_text_file: output/domains/stroke/digest.txt
