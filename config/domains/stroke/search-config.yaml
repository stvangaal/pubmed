# owner: stroke-migration
config_version: 1
mesh_terms:
  - "stroke"
date_window_days: 7
retmax: 200
require_abstract: true
rate_limit_delay: 0.4

# Language filter — applied at PubMed query level.
require_language: "eng"

# MeSH terms excluded at search time (reduces candidate set before filtering).
exclude_mesh_terms:
  - "animals"
  - "mice"
  - "rats"
  - "disease models, animal"
  - "in vitro techniques"

# Article types excluded at search time.
exclude_article_types:
  - "case reports"
  - "letter"
  - "editorial"
  - "comment"
  - "news"
  - "biography"
  - "historical article"
  - "published erratum"
  - "retraction of publication"
  - "retracted publication"

# Related conditions: high-impact articles only (RCTs, systematic reviews,
# meta-analyses, reviews). The LLM triage filters reviews by journal quality.
related_searches:
  - mesh_terms:
      - "atrial fibrillation"
    require_article_types:
      - "randomized controlled trial"
      - "meta-analysis"
      - "systematic review"
      - "review"
  - mesh_terms:
      - "carotid stenosis"
    require_article_types:
      - "randomized controlled trial"
      - "meta-analysis"
      - "systematic review"
      - "review"
  - mesh_terms:
      - "intracranial hemorrhages"
    require_article_types:
      - "randomized controlled trial"
      - "meta-analysis"
      - "systematic review"
      - "review"
  - mesh_terms:
      - "ischemic attack, transient"
    require_article_types:
      - "randomized controlled trial"
      - "meta-analysis"
      - "systematic review"
      - "review"
  - mesh_terms:
      - "intracranial embolism and thrombosis"
    require_article_types:
      - "randomized controlled trial"
      - "meta-analysis"
      - "systematic review"
      - "review"
