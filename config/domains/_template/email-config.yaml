# owner: email-send
# Domain-scoped email configuration.
# Copy to config/domains/<domain>/email-config.yaml and fill in TODO fields.
config_version: 1

# Whether to actually send emails (set false for local dev / dry runs).
enabled: true

# TODO: Sender address (must be verified in Resend, or use onboarding@resend.dev for testing).
from_address: "TODO: digest@yourdomain.com"

# TODO: Recipient list for this domain's digest.
to_addresses:
  - "TODO: recipient@example.com"

# TODO: Email subject line. Supports {date_range} and {article_count} placeholders.
subject: "TODO: Domain Literature Weekly — {date_range}"

# TODO: Domain owner email — receives troubleshooting report each run (optional).
owner_email: "TODO: owner@example.com"
