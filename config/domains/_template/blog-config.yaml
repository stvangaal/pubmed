# owner: blog-publish
# Domain-scoped blog publishing configuration.
# Copy to config/domains/<domain>/blog-config.yaml and fill in TODO fields.
config_version: 1

# TODO: Title shown in the blog header.
site_title: "TODO: Domain Literature Weekly"

# TODO: One-sentence description for the blog index.
site_description: "TODO: A curated weekly digest of practice-changing <domain> literature from PubMed."

# Base URL for the published site (no trailing slash).
# GitHub Pages default: https://<username>.github.io/<repo>
base_url: "https://stvangaal.github.io/pubmed"

# Whether to actually push to gh-pages (set false for local dev / dry runs).
publish: true

# Branch to push to.
branch: "gh-pages"

# TODO: Subdirectory within gh-pages where digest pages for this domain are stored.
# Use digests/<domain> to keep domains isolated on the blog.
digests_dir: "digests/_template"

# Closing text appended to each blog page.
closing: >-
  This digest was generated by the PubMed Monitor pipeline.
  Feedback on individual articles is welcome — use the feedback links above.

# Shared rendering templates (usually unchanged per domain).
templates:
  post: "config/templates/blog-post.md"
  index: "config/templates/blog-index.md"
