# owner: digest-build
# Domain-scoped digest distribution configuration.
# Copy to config/domains/<domain>/distribute-config.yaml and fill in TODO fields.

# TODO: Title shown in the digest header and email subject.
digest_title: "TODO: Domain Literature Weekly"

# Opening paragraph. Supports {date_range} and {article_count} placeholders.
opening: >-
  TODO: Domain Literature Weekly — {date_range}

  {article_count} articles identified this week.

# Closing paragraph for the email digest.
closing: >-
  This digest was generated by the PubMed Monitor pipeline.
  Reply with feedback or forward to colleagues who may find it useful.

sort_by: triage_score

# Articles scoring >= this value get the full summary in the email.
# Articles below get a 2-sentence teaser with a link to the blog page.
full_summary_threshold: 0.80

output:
  # TODO: Set to output/domains/<domain>/digest.md
  file: output/domains/_template/digest.md
  plain_text: true
  # TODO: Set to output/domains/<domain>/digest.txt
  plain_text_file: output/domains/_template/digest.txt
