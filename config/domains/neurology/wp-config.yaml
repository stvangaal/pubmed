# owner: neurology-digest
# Neurology domain WordPress configuration.
config_version: 1

# Whether to upload articles to WordPress (set false to skip).
enabled: true

# WordPress site URL (no trailing slash).
site_url: "https://h41.566.myftpupload.com"

# Slug of the custom taxonomy registered for clinical topics.
clinical_topics_taxonomy: "clinical_topics"

# Environment variable names for this domain's WordPress credentials.
env_username: "WP_NEUROLOGY_USERNAME"
env_app_password: "WP_NEUROLOGY_APP_PASSWORD"
env_digest_secret: "WP_NEUROLOGY_DIGEST_SECRET"

# Meta fields the pipeline plugin should expose via REST API.
expected_meta_fields:
  - pmid
  - triage_score
  - journal
  - pub_date
  - source_topic
  - preindex

# Static pages to sync from content/pages/ to WordPress.
# Each slug resolves via: content/pages/neurology/{slug}.md → content/pages/_defaults/{slug}.md
pages:
  - landing
  - about
  - disclaimer
  - privacy-policy
  - terms-of-use
