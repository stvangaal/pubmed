# owner: llm-triage
# Default filter configuration for the PubMed Stroke Monitor pipeline.
# See docs/definitions/filter-config.md for the canonical schema.

rule_filter:
  require_abstract: true
  # Language, MeSH exclusions, and article type exclusions have been moved
  # to search-config.yaml to filter at PubMed query time.
  include_article_types:
    - "randomized controlled trial"
    - "meta-analysis"
    - "systematic review"
    - "practice guideline"
    - "guideline"
    - "clinical trial"
    - "clinical trial, phase iii"
    - "clinical trial, phase iv"
    - "multicenter study"
    - "observational study"
    - "comparative study"

llm_triage:
  model: "claude-sonnet-4-6"
  max_tokens: 150
  score_threshold: 0.70
  max_articles: 10
  use_prompt_caching: true
  triage_prompt_file: "config/prompts/triage-prompt.md"

priority_journals:
  - "the new england journal of medicine"
  - "the lancet"
  - "the lancet. neurology"
  - "jama"
  - "jama neurology"
  - "stroke"
  - "annals of neurology"
  - "neurology"
  - "circulation"
  - "bmj (clinical research ed.)"
  - "annals of internal medicine"
  - "european stroke journal"
  - "international journal of stroke"
