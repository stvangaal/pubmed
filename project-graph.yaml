# Do not edit manually — regenerate with: bash scripts/generate-graph.sh
---
nodes:
  - id: spec:consolidate-spec
    type: spec
    name: consolidate-spec
    status: draft
    path: docs/specs/consolidate-spec.spec.md
  - id: spec:git-workflow-tooling
    type: spec
    name: git-workflow-tooling
    status: draft
    path: docs/specs/git-workflow-tooling.spec.md
  - id: skill:architect
    type: skill
    layer: 0
    stage: governance
    description: "Interview the user to determine project shape, match to an architecture archetype, surface essential decisions, recommend spikes, and scaffold ARCHITECTURE.md and group documents. Standalone or called by /init-project."
    path: .claude/skills/architect/SKILL.md
  - id: skill:check-contracts
    type: skill
    layer: 2
    stage: governance
    description: Check version pin staleness — compares contracts.yaml against definition files and spec Requires/Provides tables. Use after editing definitions or specs.
    path: .claude/skills/check-contracts/SKILL.md
  - id: skill:check-register
    type: skill
    layer: 1
    stage: governance
    description: Audit file ownership — finds source files not listed in REGISTER.md and specs listed in the register whose files don't exist on disk. Use after adding new files or refactoring.
    path: .claude/skills/check-register/SKILL.md
  - id: skill:cleanup
    type: skill
    layer: 0
    stage: cleanup
    description: Post-merge cleanup — switch to main, pull latest, delete the merged feature branch, and verify spec status. Use after a PR has been merged.
    path: .claude/skills/cleanup/SKILL.md
  - id: skill:consolidate
    type: skill
    layer: 0
    stage: design
    description: Formalize your code into specs — scan branch changes, group by responsibility, generate governed specs
    path: .claude/skills/consolidate/SKILL.md
  - id: skill:design
    type: skill
    layer: 0
    stage: design
    description: Wrapper skill that orchestrates the design phase — runs external brainstorming to produce a design spec, then consolidates into a governed spec ready for implementation. Use at the start of planned work.
    path: .claude/skills/design/SKILL.md
  - id: skill:finish
    type: skill
    layer: 0
    stage: finish
    description: Complete implementation work — verify, promote spec to implemented, and create a pull request. Use when implementation is done and you're ready to ship.
    path: .claude/skills/finish/SKILL.md
  - id: skill:generate-register
    type: skill
    layer: 0
    stage: governance
    description: Auto-generate REGISTER.md from spec frontmatter. Shows diff before writing.
    path: .claude/skills/generate-register/SKILL.md
  - id: skill:generate-spec
    type: skill
    layer: 0
    stage: design
    description: Create governed specification, definition, or architecture documents following the spec-driven workflow. Use when you need a new spec, shared definition, reference document, or architecture doc.
    path: .claude/skills/generate-spec/SKILL.md
  - id: skill:health-check
    type: skill
    layer: 0
    stage: governance
    description: Run a full project health check — detects drift between register, contracts, definitions, and specs. Use when starting work, before committing, or when something feels off.
    path: .claude/skills/health-check/SKILL.md
  - id: skill:init-project
    type: skill
    layer: 0
    stage: governance
    description: Initialize a new project with spec-driven development infrastructure — creates directory structure, copies templates, sets up hooks. Use when starting a new project or adding spec governance to an existing one.
    path: .claude/skills/init-project/SKILL.md
  - id: skill:orient
    type: skill
    layer: 0
    stage: start
    description: Codebase orientation — given a change description, queries project-graph.yaml to show which specs, skills, and scripts are relevant and where gaps exist. Use at the start of new work or when unsure where a change fits.
    path: .claude/skills/orient/SKILL.md
  - id: skill:pr
    type: skill
    layer: 0
    stage: finish
    description: Create a pull request with spec-aware body, health-check summary, and security review suggestion. Use when ready to open a PR for the current branch.
    path: .claude/skills/pr/SKILL.md
  - id: skill:promote-spec
    type: skill
    layer: 0
    stage: finish
    description: Advance a specification through the status state machine (draft → ready → in-progress → implemented). Runs validation gates at each transition.
    path: .claude/skills/promote-spec/SKILL.md
  - id: skill:reflect
    type: skill
    layer: 0
    stage: unknown
    description: "Lightweight learning interview at natural stopping points — post-merge, post-spike, or post-incident. Captures lessons while context is fresh. Suggested by /cleanup but never bundled into it."
    path: .claude/skills/reflect/SKILL.md
  - id: skill:security-review
    type: skill
    layer: 2
    stage: finish
    description: Analyze AI-facing code for prompt injection and instruction hijacking risks. Use before PRs that modify hooks, skills, scripts, or agent instruction files.
    path: .claude/skills/security-review/SKILL.md
  - id: skill:spec-status
    type: skill
    layer: 1
    stage: governance
    description: Show a dashboard of all specification statuses, ownership, and dependencies. Use to understand project state at a glance.
    path: .claude/skills/spec-status/SKILL.md
  - id: skill:start
    type: skill
    layer: 0
    stage: start
    description: Entry point for new work — ensures a GitHub issue exists, determines whether the change is planned or exploratory, and routes to the appropriate workflow path. Auto-invoked by CLAUDE.md when a change request is detected.
    path: .claude/skills/start/SKILL.md
  - id: skill:sync-contracts
    type: skill
    layer: 2
    stage: governance
    description: Regenerate contracts.yaml from spec Requires/Provides tables. Use after editing spec dependencies. Shows a dry-run diff first for approval.
    path: .claude/skills/sync-contracts/SKILL.md
  - id: skill:validate-refs
    type: skill
    layer: 2
    stage: governance
    description: Validate cross-references between specs, definitions, register, and contracts.yaml. Catches broken references, missing files, and notation inconsistencies.
    path: .claude/skills/validate-refs/SKILL.md
  - id: script:bootstrap-project
    type: script
    path: scripts/bootstrap-project.sh
