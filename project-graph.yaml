  - id: hook:post-commit-check
    type: hook
    trigger: PostToolUse
    path: .claude/hooks/post-commit-check.sh
  - id: hook:pre-commit-branch-check
    type: hook
    trigger: PreToolUse
    path: .claude/hooks/pre-commit-branch-check.sh
  - id: hook:pre-implementation-check
    type: hook
    trigger: PreToolUse
    path: .claude/hooks/pre-implementation-check.sh
  - id: hook:session-start
    type: hook
    trigger: SessionStart
    path: .claude/hooks/session-start.sh
  - id: doc:spec-workflow
    type: document
    path: SPEC-WORKFLOW.md
  - id: doc:register
    type: document
    path: docs/REGISTER.md
  - id: doc:architecture
    type: document
    path: docs/ARCHITECTURE.md
  - id: doc:contracts
    type: document
